<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>陈总的小窝</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 启动画面 -->
  <div class="splash-screen" id="splash-screen">
    <h1 class="title">陈总的小窝</h1>
    <div class="loader"></div>
  </div>
  
  <!-- 粒子背景 -->
  <canvas id="particle-canvas"></canvas>
  
  <!-- 主题切换按钮 -->
  <button class="theme-toggle" id="theme-toggle" title="切换主题">🌙</button>
  
  <!-- 主容器 -->
  <div class="container">
    <header class="header">
      <h1>欢迎来到陈总的小窝</h1>
    </header>
    
    <!-- 轮播图 -->
    <section class="carousel-section">
      <div class="carousel">
        <div class="carousel-wrapper" id="carousel-wrapper">
          <div class="carousel-slide">
            <img src="https://picsum.photos/400/533?random=1" alt="轮播图1">
          </div>
          <div class="carousel-slide">
            <img src="https://picsum.photos/400/533?random=2" alt="轮播图2">
          </div>
          <div class="carousel-slide">
            <img src="https://picsum.photos/400/533?random=3" alt="轮播图3">
          </div>
        </div>
        <div class="carousel-indicator">
          <span class="active" data-index="0"></span>
          <span data-index="1"></span>
          <span data-index="2"></span>
        </div>
      </div>
    </section>
    
    <!-- 分类标签 -->
    <div class="categories">
      <button class="category-btn active" data-category="all">全部</button>
      <button class="category-btn" data-category="image">图片</button>
      <button class="category-btn" data-category="document">文档</button>
      <button class="category-btn" data-category="video">视频</button>
      <button class="category-btn" data-category="other">其他</button>
    </div>
    
    <!-- 文件列表 -->
    <div class="file-grid" id="fileList"></div>
  </div>
  
  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <button class="nav-btn nav-item active" data-nav="home">
      <span class="icon">🏠</span>
      <span>首页</span>
    </button>
    <button class="nav-btn nav-item" data-nav="category">
      <span class="icon">📂</span>
      <span>分类</span>
    </button>
    <button class="nav-btn nav-item" data-nav="star">
      <span class="icon">⭐</span>
      <span>收藏</span>
    </button>
    <button class="nav-btn nav-item" data-nav="profile">
      <span class="icon">👤</span>
      <span>我的</span>
    </button>
  </nav>
  
  <script src="app.js"></script>
</body>
</html>
